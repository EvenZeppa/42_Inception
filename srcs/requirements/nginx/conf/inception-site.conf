server {  
    listen 443 ssl;  
    server_name __DOMAIN_NAME__;

	ssl_certificate		/etc/nginx/ssl/inception.crt;
	ssl_certificate_key	/etc/nginx/ssl/inception.key;

    ssl_protocols		TLSv1.2 TLSv1.3;

    root /var/www/html;  
    index index.php index.html;  

    charset utf-8;  

    location / {  
        try_files $uri $uri/ /index.php?$query_string;  
    }    

    access_log off;  
    error_log /var/log/nginx/error.log error;  

    sendfile off;  

    client_max_body_size 100m;  

    location ~ \.php$ {  
        fastcgi_split_path_info ^(.+.php)(/.+)$;  
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $php_upstream wordpress:9000;
        fastcgi_pass $php_upstream;
        fastcgi_index index.php;  
        include fastcgi_params;  
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;  
        fastcgi_intercept_errors off;  
        fastcgi_buffer_size 16k;  
        fastcgi_buffers 4 16k;  
    }  

    location ~ /.ht {  
        deny all;  
    }

    # Bonus: Adminer (database management)
    location /adminer {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $adminer_upstream adminer:8080;
        proxy_pass http://$adminer_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bonus: Static showcase site
    location /portfolio {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $static_upstream static-site:8080;
        proxy_pass http://$static_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
} 
